# e2e-tddft-casscf-mf.yaml — TD-DFT + CASSCF algorithm fan-out test
# Tests: orca-tddft, gaussian-tddft, orca-casscf, gaussian-casscf
mf_version: "1.0"
name: e2e-tddft-casscf
description: "TD-DFT/CASSCF fan-out: H2O → orca-tddft, gaussian-tddft, orca-casscf, gaussian-casscf"

global_params: {}

nodes:
  - id: geom-input
    nodespec_path: nodes/chemistry/preprocessing/geometry-file-input/nodespec.yaml
    onboard_params:
      inline_geometry: |
        3
        Water
        O   0.000000   0.000000   0.117176
        H   0.000000   0.756950  -0.468705
        H   0.000000  -0.756950  -0.468705

  - id: orca-tddft
    nodespec_path: nodes/chemistry/orca/orca-tddft/nodespec.yaml
    onboard_params:
      functional: B3LYP
      basis_set: def2-SVP
      n_states: 5

  - id: gaussian-tddft
    nodespec_path: nodes/chemistry/gaussian/gaussian-tddft/nodespec.yaml
    onboard_params:
      functional: PBE0
      basis_set: 6-31G*
      n_states: 5

  - id: orca-casscf
    nodespec_path: nodes/chemistry/orca/orca-casscf/nodespec.yaml
    onboard_params:
      basis_set: STO-3G
      active_electrons: 2
      active_orbitals: 2

  - id: gaussian-casscf
    nodespec_path: nodes/chemistry/gaussian/gaussian-casscf/nodespec.yaml
    onboard_params:
      basis_set: STO-3G
      active_electrons: 2
      active_orbitals: 2

connections:
  - from: geom-input.xyz_geometry
    to: orca-tddft.xyz_geometry
  - from: geom-input.xyz_geometry
    to: gaussian-tddft.xyz_geometry
  - from: geom-input.xyz_geometry
    to: orca-casscf.xyz_geometry
  - from: geom-input.xyz_geometry
    to: gaussian-casscf.xyz_geometry
