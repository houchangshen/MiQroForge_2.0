# ===========================================================================
# multi-software-h2o-energy-compare-mf.yaml — 多软件单点能量对比
#
# MiQroForge 2.0 工作流定义：
#                     ┌→ orca-sp (B3LYP/def2-SVP)
#   geom-input ───────┤
#                     └→ psi4-sp (B3LYP/cc-pVDZ)
#
# 对同一个 H2O 分子分别使用 ORCA 和 Psi4 进行单点能量计算，
# 验证不同软件对同一化学体系的计算结果一致性。
# 此 workflow 展示了 MF 的 fan-out 模式：一个输出同时供给多个下游节点。
#
# 注意：
#   - ORCA 使用 def2-SVP 基组（ORCA 社区常用）
#   - Psi4 使用 cc-pVDZ 基组（Psi4 社区常用）
#   - 基组不同，能量预期会有差异；如需严格对比请使用相同基组
#   - 两个节点互不依赖，Argo 会自动并行调度
#
# 前提：
#   1. ORCA 镜像已构建并推送
#   2. Psi4 镜像已构建并推送
#
# 运行：
#   bash scripts/mf2.sh validate workflows/examples/multi-software-h2o-energy-compare-mf.yaml
#   bash scripts/mf2.sh compile  workflows/examples/multi-software-h2o-energy-compare-mf.yaml
#   bash scripts/mf2.sh run      workflows/examples/multi-software-h2o-energy-compare-mf.yaml
# ===========================================================================

mf_version: "1.0"
name: multi-software-h2o-energy-compare
description: >
  Cross-software single-point energy comparison: ORCA B3LYP/def2-SVP vs
  Psi4 B3LYP/cc-pVDZ for the same H2O geometry. Demonstrates fan-out
  (one geometry → multiple compute nodes in parallel).

global_params: {}

nodes:
  - id: geom-input
    nodespec_path: nodes/chemistry/preprocessing/geometry-file-input/nodespec.yaml
    onboard_params:
      inline_geometry: |
        3
        Water molecule (experimental geometry)
        O   0.000000   0.000000   0.117176
        H   0.000000   0.756950  -0.468705
        H   0.000000  -0.756950  -0.468705

  - id: orca-sp
    nodespec_path: nodes/chemistry/orca/orca-single-point/nodespec.yaml
    onboard_params:
      method: B3LYP
      basis_set: def2-SVP
      dispersion: D3BJ
      charge: 0
      multiplicity: 1
      n_cores: 4

  - id: psi4-sp
    nodespec_path: nodes/chemistry/psi4/psi4-single-point/nodespec.yaml
    onboard_params:
      method: B3LYP
      basis_set: cc-pVDZ
      reference: rhf
      scf_type: pk
      charge: 0
      multiplicity: 1
      n_cores: 4

connections:
  # fan-out: 同一几何供给两个计算节点
  - from: geom-input.xyz_geometry
    to: orca-sp.xyz_geometry
  - from: geom-input.xyz_geometry
    to: psi4-sp.xyz_geometry
