# e2e-cp2k-crystal-mf.yaml — CP2K crystal semantic type test
# Tests: cp2k-dft with new crystal-single-point-energy semantic type
mf_version: "1.0"
name: e2e-cp2k-crystal
description: "CP2K crystal test: cp2k-dft with PBE functional"

global_params: {}

nodes:
  - id: geom-input
    nodespec_path: nodes/chemistry/preprocessing/geometry-file-input/nodespec.yaml
    onboard_params:
      inline_geometry: |
        2
        Si crystal fragment
        Si   0.000000   0.000000   0.000000
        Si   1.357500   1.357500   1.357500

  - id: cp2k-dft
    nodespec_path: nodes/chemistry/cp2k/cp2k-dft/nodespec.yaml
    onboard_params:
      functional: PBE
      basis_set: DZVP-MOLOPT-SR-GTH
      cell_abc: "5.43 5.43 5.43 90 90 90"
      cutoff: 400

connections:
  - from: geom-input.xyz_geometry
    to: cp2k-dft.xyz_geometry
