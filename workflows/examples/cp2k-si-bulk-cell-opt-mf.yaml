# ===========================================================================
# CP2K Si 体相晶胞优化工作流
#
# 使用 CP2K 对 Si 金刚石结构进行晶胞+原子位置联合优化
# 找到平衡晶格常数
# ===========================================================================
mf_version: "1.0"
name: cp2k-si-bulk-cell-opt
description: >
  Periodic DFT cell optimization of bulk silicon (diamond structure)
  using CP2K. Finds equilibrium lattice constant and atomic positions.

global_params: {}

nodes:
  - id: geom-input
    nodespec_path: nodes/chemistry/preprocessing/geometry-file-input/nodespec.yaml
    onboard_params:
      inline_geometry: |
        8
        Si diamond conventional cell (a=5.43A)
        Si   0.000000   0.000000   0.000000
        Si   1.357500   1.357500   1.357500
        Si   2.715000   2.715000   0.000000
        Si   4.072500   4.072500   1.357500
        Si   2.715000   0.000000   2.715000
        Si   4.072500   1.357500   4.072500
        Si   0.000000   2.715000   2.715000
        Si   1.357500   4.072500   4.072500

  - id: cell-opt
    nodespec_path: nodes/chemistry/cp2k/cp2k-cell-opt/nodespec.yaml
    onboard_params:
      xc_functional: PBE
      basis_set: DZVP-MOLOPT-SR-GTH
      cutoff: 400
      rel_cutoff: 50
      max_scf: 50
      eps_scf: 1.0e-6
      smearing: none
      electronic_temperature: 0
      opt_algorithm: BFGS
      max_opt_iter: 200
      opt_max_force: 4.5e-4
      cell_opt_type: DIRECT_CELL_OPT
      external_pressure: 0.0
      cell_abc: "5.43 5.43 5.43 90 90 90"
      charge: 0
      multiplicity: 1
      n_cores: 4

connections:
  - from: geom-input.xyz_geometry
    to: cell-opt.xyz_geometry
