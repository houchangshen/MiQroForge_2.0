# MiQroForge 2.0 — Argo Workflow Controller ConfigMap
# 控制器核心配置，覆盖默认行为以适配平台需求。
# 参考：https://argo-workflows.readthedocs.io/en/latest/workflow-controller-configmap/
#
# ⚠️ 版本兼容性：当前集群 Argo v3.6.2。
#   以下字段需 v3.7+，已注释禁用：
#     - podGCStrategy             (v3.7+)
#     - resourceStateCheckFrequency (v3.7+)
#   workflowNamespace 留空 = 监听所有 namespace（开发版/运行版隔离靠 K8s namespace）。
#   workflowDefaults 删除 — MiQroForge 编译器在每份 Argo YAML 里已显式指定 ServiceAccount。
apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-controller-configmap
  namespace: argo
data:
  # 并发控制：全局最大并行 workflow 数
  # 调整此值以匹配集群实际资源容量
  parallelism: "10"
